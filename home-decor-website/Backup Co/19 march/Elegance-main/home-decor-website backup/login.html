<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elegance Home Decor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #203f5f;
            --secondary: #f8e587;
            --accent: #d3ae6a;
            --background: #ffffff;
            --text: #333333;
            --success: #27AE60;
            --error: #E74C3C;
            --white: #FFFFFF;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --shadow-hover: 0 20px 60px rgba(0,0,0,0.15);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(32, 63, 95, 0.95) 0%, rgba(33, 91, 139, 0.695) 50%, rgb(24, 97, 145) 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1000 1000\"><defs><radialGradient id=\"a\" cx=\"50%\" cy=\"50%\"><stop offset=\"0%\" stop-color=\"rgba(255,255,255,0.1)\"></stop><stop offset=\"100%\" stop-color=\"rgba(255,255,255,0)\"></stop></radialGradient></defs><circle cx=\"200\" cy=\"200\" r=\"100\" fill=\"url(%23a)\"><animate attributeName=\"cy\" values=\"200;800;200\" dur=\"20s\" repeatCount=\"indefinite\"/></circle><circle cx=\"800\" cy=\"800\" r=\"80\" fill=\"url(%23a)\"><animate attributeName=\"cy\" values=\"800;200;800\" dur=\"25s\" repeatCount=\"indefinite\"/></circle></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-hover);
            animation: fadeInUp 1s ease;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--secondary), var(--accent));
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--white), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            display: block;
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            color: var(--white);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: var(--white);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: var(--white);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px rgba(211, 174, 106, 0.1);
        }

        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .eye-icon:hover {
            color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: var(--primary);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .demo-info {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        .demo-info strong {
            color: var(--accent);
        }

        .guest-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            margin-bottom: 20px;
        }

        .guest-link:hover {
            color: var(--accent);
        }

        .register-link {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--success);
            color: var(--white);
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.4s ease;
            box-shadow: var(--shadow-hover);
        }

        .toast.error {
            background: var(--error);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--accent);
            font-size: 18px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 40px 30px;
                margin: 20px;
            }

            .login-title {
                font-size: 24px;
            }

            .logo {
                font-size: 28px;
            }
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo">Elegance.</span>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to your account</p>
            </div>

            <div class="demo-info">
                <strong>Demo:</strong> demo@elegance.com / demo123
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye-slash eye-icon" id="togglePassword"></i>
                </div>

                <button type="submit" class="btn-login">
                    <span id="loginText">Sign In</span>
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>
            </form>

            <a href="index.html" class="guest-link">
                <i class="fas fa-user-plus"></i> Continue as Guest
            </a>

            <div class="register-link">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>
    
    
    <script type="module">
        import { auth } from './firebase.js';
        import { signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
        
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        // Form submission - Firebase auth with demo fallback
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginText = document.getElementById('loginText');
            const loading = document.querySelector('.loading');
            
            // Show loading
            loginText.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                // Try real Firebase auth first
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('userEmail', userCredential.user.email);
                showToast('Login successful! Redirecting...', 'success');
            } catch (error) {
                // Fallback to demo login
                if (email === 'demo@elegance.com' && password === 'demo123') {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    showToast('Demo login successful! Redirecting...', 'success');
                } else {
                    throw new Error('Invalid credentials');
                }
            } finally {
                showToast('Redirecting...', 'success');
                loginText.style.display = 'inline';
                loading.style.display = 'none';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            }
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = toast.querySelector('i');
            const toastMsg = document.getElementById('toastMessage');
            
            toastMsg.textContent = message;
            toast.className = `toast ${type} show`;
            toastIcon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // Check if already logged in
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
